version: "3.9"

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: fleetiq_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend (Node.js + Express + TypeScript) ────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fleetiq_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 8000
      MONGO_URL: mongodb://mongo:27017/FleetManagement
      JWT_SECRET: ${JWT_SECRET:-fleetiq_dev_secret_change_in_production}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_REPLACE_ME}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_REPLACE_ME}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET:-whsec_REPLACE_ME}
      STRIPE_PRICE_DRIVER_MONTHLY: ${STRIPE_PRICE_DRIVER_MONTHLY:-price_REPLACE_ME}
      STRIPE_PRICE_DRIVER_ANNUAL: ${STRIPE_PRICE_DRIVER_ANNUAL:-price_REPLACE_ME}
      STRIPE_PRICE_VEHICLE_MONTHLY: ${STRIPE_PRICE_VEHICLE_MONTHLY:-price_REPLACE_ME}
      STRIPE_PRICE_VEHICLE_ANNUAL: ${STRIPE_PRICE_VEHICLE_ANNUAL:-price_REPLACE_ME}
      STRIPE_PRICE_BUNDLE_MONTHLY: ${STRIPE_PRICE_BUNDLE_MONTHLY:-price_REPLACE_ME}
      STRIPE_PRICE_BUNDLE_ANNUAL: ${STRIPE_PRICE_BUNDLE_ANNUAL:-price_REPLACE_ME}
      CLIENT_URL: http://localhost:5173
    volumes:
      # Mount source for hot-reload; keep container's node_modules
      - ./server/src:/app/src
      - ./server/controller:/app/controller
      - ./server/routes:/app/routes
      - ./server/model:/app/model
      - ./server/middleware:/app/middleware
      - ./server/scripts:/app/scripts
      - ./server/uploads:/app/uploads

  # ─── Frontend (React + Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fleetiq_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      # Browser-visible API URL (goes through Vite proxy in dev)
      VITE_API_BASE_URL: /api
      # Tell Vite proxy where to forward /api requests (backend service name)
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      # Mount source for HMR; keep container's node_modules
      - ./client/src:/app/src
      - ./client/public:/app/public

volumes:
  mongo_data:
    name: fleetiq_mongo_data
